<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Log — Presence Pulse</title>
<link rel="stylesheet" href="globals.css">
<script src="shared-sidebar.js"></script>
<script>
  window.__PP_USER = { name: "{{ user_full_name|default:'User' }}", initials: "{{ user_initials|default:'U' }}" };
</script>

<style>
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px; margin-top: 12px;
  }
  .cal-day-label {
    text-align: center; font-size: 10px;
    color: var(--text-3); font-weight: 600; padding-bottom: 4px;
  }
  .cal-cell {
    aspect-ratio: 1; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: transform 0.1s;
  }
  .cal-cell:hover { transform: scale(1.1); }
  .cal-empty { background: transparent; }
  .cal-score-high { background: rgba(74,222,128,0.20); color: #4ade80; }
  .cal-score-mid  { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .cal-score-low  { background: rgba(248,113,113,0.15); color: #f87171; }
  .cal-today { outline: 2px solid var(--purple-400); }
  .cal-empty-cell { background: var(--bg-3); color: var(--text-3); }

  .filter-row {
    display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-chip {
    padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border-1); background: var(--bg-2);
    color: var(--text-2); cursor: pointer; transition: all 0.15s;
  }
  .filter-chip.active, .filter-chip:hover {
    background: rgba(99,85,232,0.15);
    border-color: rgba(99,85,232,0.3);
    color: var(--purple-400);
  }
  .search-input {
    background: var(--bg-2); border: 1px solid var(--border-1);
    border-radius: var(--radius-sm); padding: 8px 14px;
    color: var(--text-0); font-family: var(--font-body); font-size: 13px;
    outline: none; min-width: 200px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: rgba(99,85,232,0.4); }
  .search-input::placeholder { color: var(--text-3); }

  .session-card {
    background: var(--bg-1); border: 1px solid var(--border-0);
    border-radius: var(--radius-lg); margin-bottom: 10px;
    overflow: hidden; transition: border-color 0.2s;
  }
  .session-card:hover { border-color: var(--border-1); }

  .session-header {
    display: flex; align-items: center; gap: 16px; padding: 16px 20px;
    cursor: pointer;
  }
  .session-icon {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .session-info { flex: 1; }
  .session-name { font-size: 14px; font-weight: 600; color: var(--text-0); margin-bottom: 3px; }
  .session-meta { font-size: 12px; color: var(--text-2); }
  .session-scores { display: flex; align-items: center; gap: 10px; }
  .expand-arrow { font-size: 14px; color: var(--text-3); transition: transform 0.2s; }

  .session-detail {
    display: none; padding: 0 20px 16px; border-top: 1px solid var(--border-0);
  }
  .session-detail.open { display: block; }
  .detail-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding-top: 14px;
  }
  .detail-stat {
    background: var(--bg-2); border-radius: var(--radius-sm); padding: 12px;
    text-align: center;
  }
  .detail-stat-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-0); }
  .detail-stat-label { font-size: 11px; color: var(--text-2); margin-top: 3px; }
  .nudge-timeline { margin-top: 14px; }
  .nt-label { font-size: 12px; color: var(--text-2); margin-bottom: 8px; font-weight: 600; }
  .nt-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-1); margin-bottom: 6px; }
  .nt-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── SESSIONS MOBILE ── */
  @media (max-width: 768px) {
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    .session-header { flex-wrap: wrap; gap: 10px; }
    .session-scores { width: 100%; justify-content: flex-end; }
    .filter-row { gap: 6px; }
    .filter-chip { padding: 6px 10px; font-size: 11px; }
    .search-input { min-width: 100%; }
  }
</style>
</head>
<body data-page="sessions" id="body">
<div class="app-shell">
  <main class="main-content">
    <div class="page-header fade-up" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="page-title">Session log</div>
        <div class="page-subtitle">All detected social interactions with presence data</div>
      </div>
      <button class="btn btn-ghost" style="font-size:13px;">Export CSV ↓</button>
    </div>

    <div class="grid-2-1 fade-up fade-up-1">
      <!-- Left: session list -->
      <div>
        <div class="filter-row">
          <input type="text" class="search-input" placeholder="Search sessions..." id="searchInput" oninput="filterSessions()">
          <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
          <div class="filter-chip" onclick="setFilter('high',this)">High score</div>
          <div class="filter-chip" onclick="setFilter('low',this)">Needs work</div>
          <div class="filter-chip" onclick="setFilter('meal',this)">Meals</div>
          <div class="filter-chip" onclick="setFilter('meeting',this)">Meetings</div>
        </div>

        <div id="sessionList">
          <!-- Sessions rendered by JS -->
        </div>
      </div>

      <!-- Right: calendar -->
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="card fade-up fade-up-2">
          <div class="card-title">March 2025 heatmap</div>
          <div class="calendar-grid">
            <div class="cal-day-label">Su</div><div class="cal-day-label">Mo</div>
            <div class="cal-day-label">Tu</div><div class="cal-day-label">We</div>
            <div class="cal-day-label">Th</div><div class="cal-day-label">Fr</div>
            <div class="cal-day-label">Sa</div>
          </div>
          <div class="calendar-grid" id="calGrid"></div>
          <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;">
            <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);"><span style="width:10px;height:10px;border-radius:2px;background:rgba(74,222,128,0.20);display:inline-block;"></span>High (75+)</span>
            <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);"><span style="width:10px;height:10px;border-radius:2px;background:rgba(251,191,36,0.15);display:inline-block;"></span>Medium</span>
            <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);"><span style="width:10px;height:10px;border-radius:2px;background:rgba(248,113,113,0.15);display:inline-block;"></span>Low</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Month summary</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div style="background:var(--bg-2);border-radius:var(--radius-sm);padding:12px;text-align:center;">
              <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-0);">38</div>
              <div style="font-size:11px;color:var(--text-2);">Total sessions</div>
            </div>
            <div style="background:var(--bg-2);border-radius:var(--radius-sm);padding:12px;text-align:center;">
              <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--green-400);">71</div>
              <div style="font-size:11px;color:var(--text-2);">Avg score</div>
            </div>
            <div style="background:var(--bg-2);border-radius:var(--radius-sm);padding:12px;text-align:center;">
              <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--teal-400);">88</div>
              <div style="font-size:11px;color:var(--text-2);">Best session</div>
            </div>
            <div style="background:var(--bg-2);border-radius:var(--radius-sm);padding:12px;text-align:center;">
              <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--red-400);">41</div>
              <div style="font-size:11px;color:var(--text-2);">Worst session</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const sessions = [
  { id:1, name:'Dinner with family', icon:'🍽️', iconBg:'rgba(74,222,128,0.12)', type:'meal', date:'Today', time:'7:30 PM', duration:'45 min', score:82, ble:3, unlocks:2, appSwitches:1, nudges:[{l:'L1 Haptic',c:'#6355e8',outcome:'Accepted'}], scoreClass:'badge-green' },
  { id:2, name:'Team standup', icon:'💼', iconBg:'rgba(99,85,232,0.12)', type:'meeting', date:'Today', time:'3:00 PM', duration:'60 min', score:61, ble:5, unlocks:7, appSwitches:4, nudges:[{l:'L2 Banner',c:'#6355e8',outcome:'Accepted'},{l:'L3 Breathing',c:'#fbbf24',outcome:'Dismissed'}], scoreClass:'badge-amber' },
  { id:3, name:'Coffee with Priya', icon:'☕', iconBg:'rgba(251,191,36,0.10)', type:'social', date:'Yesterday', time:'11:00 AM', duration:'30 min', score:91, ble:1, unlocks:1, appSwitches:0, nudges:[{l:'L1 Haptic',c:'#6355e8',outcome:'Accepted'}], scoreClass:'badge-green' },
  { id:4, name:'Evening gathering', icon:'🎉', iconBg:'rgba(248,113,113,0.10)', type:'social', date:'Yesterday', time:'6:00 PM', duration:'120 min', score:44, ble:8, unlocks:14, appSwitches:9, nudges:[{l:'L3 Breathing',c:'#fbbf24',outcome:'Dismissed'},{l:'L4 Reflection',c:'#f87171',outcome:'Ignored'}], scoreClass:'badge-red' },
  { id:5, name:'Study group', icon:'📚', iconBg:'rgba(45,212,191,0.10)', type:'meeting', date:'Mar 12', time:'2:00 PM', duration:'90 min', score:77, ble:3, unlocks:4, appSwitches:2, nudges:[{l:'L1 Haptic',c:'#6355e8',outcome:'Accepted'}], scoreClass:'badge-green' },
  { id:6, name:'Lunch with parents', icon:'🍱', iconBg:'rgba(74,222,128,0.12)', type:'meal', date:'Mar 11', time:'1:00 PM', duration:'50 min', score:85, ble:2, unlocks:2, appSwitches:1, nudges:[], scoreClass:'badge-green' },
];

let activeFilter = 'all';

function renderSessions(list) {
  const container = document.getElementById('sessionList');
  if (!list.length) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-3);">No sessions found</div>'; return; }
  container.innerHTML = list.map(s => `
    <div class="session-card" id="sc-${s.id}">
      <div class="session-header" onclick="toggleDetail(${s.id})">
        <div class="session-icon" style="background:${s.iconBg}">${s.icon}</div>
        <div class="session-info">
          <div class="session-name">${s.name}</div>
          <div class="session-meta">${s.date} · ${s.time} · ${s.duration} · ${s.ble} devices nearby</div>
        </div>
        <div class="session-scores">
          <span class="badge ${s.scoreClass}">Score ${s.score}</span>
          <span class="expand-arrow" id="arrow-${s.id}">▾</span>
        </div>
      </div>
      <div class="session-detail" id="detail-${s.id}">
        <div class="detail-grid">
          <div class="detail-stat"><div class="detail-stat-val">${s.score}</div><div class="detail-stat-label">Presence score</div></div>
          <div class="detail-stat"><div class="detail-stat-val">${s.unlocks}</div><div class="detail-stat-label">Unlocks</div></div>
          <div class="detail-stat"><div class="detail-stat-val">${s.appSwitches}</div><div class="detail-stat-label">App switches</div></div>
          <div class="detail-stat"><div class="detail-stat-val">${s.nudges.length}</div><div class="detail-stat-label">Nudges fired</div></div>
        </div>
        ${s.nudges.length ? `
        <div class="nudge-timeline">
          <div class="nt-label">Nudges during session</div>
          ${s.nudges.map(n => `
          <div class="nt-item">
            <span class="nt-dot" style="background:${n.c}"></span>
            <span>${n.l}</span>
            <span class="badge ${n.outcome==='Accepted'?'badge-green':n.outcome==='Dismissed'?'badge-amber':'badge-red'}">${n.outcome}</span>
          </div>`).join('')}
        </div>` : '<div style="font-size:12px;color:var(--text-3);margin-top:12px;">No nudges fired during this session — great presence!</div>'}
      </div>
    </div>
  `).join('');
}

function toggleDetail(id) {
  const detail = document.getElementById('detail-'+id);
  const arrow = document.getElementById('arrow-'+id);
  const isOpen = detail.classList.toggle('open');
  arrow.style.transform = isOpen ? 'rotate(180deg)' : '';
}

function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterSessions();
}

function filterSessions() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = sessions.filter(s => s.name.toLowerCase().includes(q));
  if (activeFilter === 'high') filtered = filtered.filter(s => s.score >= 75);
  if (activeFilter === 'low')  filtered = filtered.filter(s => s.score < 60);
  if (activeFilter === 'meal') filtered = filtered.filter(s => s.type === 'meal');
  if (activeFilter === 'meeting') filtered = filtered.filter(s => s.type === 'meeting');
  renderSessions(filtered);
}

// Build calendar
const scores = [null,null,null,null,null,null,82,71,65,88,null,79,41,55,70,83,null,60,74,66,80,null,91,77,null,85,70,74,74,null,null];
const calGrid = document.getElementById('calGrid');
// Add offset for March starting on Saturday (index 6)
for (let i=0;i<6;i++) calGrid.innerHTML += '<div class="cal-cell cal-empty"></div>';
scores.forEach((score,i) => {
  if (!score) { calGrid.innerHTML += `<div class="cal-cell cal-empty-cell" style="font-size:10px;color:var(--text-3);">${i+1}</div>`; return; }
  const cls = score>=75?'cal-score-high':score>=55?'cal-score-mid':'cal-score-low';
  const today = i+1===14?'cal-today':'';
  calGrid.innerHTML += `<div class="cal-cell ${cls} ${today}" title="Score: ${score}">${i+1}</div>`;
});

filterSessions();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
VANTA.NET({
  el: "#body",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  scaleMobile: 1.00,
  color: 0xA269F7,
  backgroundColor: 0x342253,
  opacity: 0.6  
})
</script>
</body>
</html>
